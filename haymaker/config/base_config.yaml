coldstart: False # meant to be set from CLI, if necessary
reset: False # doesn't really make sense to change here

log_broker: False # if additional logger with all broker messages should be created

app:
  host: 127.0.0.1
  port: 4002
  connectTimeout: 15
  appTimeout: 90
  retryDelay: 30 # seconds to wait between failed connection attempts
  probeContract:
    !!python/object/apply:ib_insync.Forex
    - EURUSD
  probeTimeout: 15
  connection_lost_retry: 90
  auto_recovery_grace_period: 120
  restart_on_recovered_connection: False # restart immediately on IB 1102 "data maintained"
  log_datafarm_status: True # log non-actionable data-farm status messages
  
controller:
  ignore_errors:
    - 2107  # Data farm connection is inactive but should be available upon demand
    - 2108  # Market data farm [...] is inactive but [...~ok]
    - 2109  # outside RTH ignored -> market doesn't distinguish regular trading hours
    - 202  # Order cancelled
    - 321 # Server error while validating an API request; frequently fired for no reason
  log_order_events: False
  future_roll_time: [14, 0] # UTC time when future rolls are executed, list [hour, minute]
  # interval at which sync will be performed
  sync_frequency: 900 # 15min
  health_check_frequency: 0 # in secs, check database connection
  # delay in sec after which controller will verify if transaction was executed correctly;
  # zero or comment-out for no verification
  execution_verification_delay: 15 # in seconds
  execution_verification_max_retries: 5
  broker_request_timeout: 10 # seconds to wait for broker sync requests
  sync_max_attempts: 3
  sync_resync_delay: 1 # seconds to wait before retrying sync after failures/corrections
  cancel_unknown_trades: False # broker-reported active orders not known to local state
  missing_brackets: "ignore" # one of: "remove", "warn", "ignore"

# best left untouched
state_machine:
  save_delay: 1 # don't save strategy data more often than that (in secs)
  strategy_collection_name: "strategies"
  order_collection_name: "orders"
  # number of attempts after which failed type of order for a contract will be suppressed
  max_rejected_orders: 3 

dfaggregator:
  market_data_lib: live_data # where market data will be saved
  save_frequency: 900 # how frequently data will be saved (in secs)
  
# timeout triggered after no data have been received for given amount of seconds
timeout:
  # behaviour after timeout triggered
  debug: False # debug: True -> log; debug: False -> restart
  # number of seconds after which timeout triggered
  time: 300 # zero means no timeout

use_blotter: True

# give collection name if block data should be saved
# False otherwise (or remove this entry)
block_data_library: False

# set-up saver used by Blotter; must have keys: class and kwds
# saver will be initialized as class(**kwds) and passed to Blotter
blotter:
  class: CsvSaver
  kwds:
    folder: blotter
    name: blotter
    use_timestamp: False
    
# this is general definition of savers that are available to be used
# they will not be instantiated unless used by an object inheriting from Atom
mongodb:
    host: localhost
    port: 27017

saver:
  ArcticSaver:
    library: test_log
  MongoSaver:
    db: test_data

# All savers saving to files will create sub-directories here:
data_folder:
  ib_data # folder inside home folder, will be created if doesn't exist
  
# These are default order params that will be used by every execution model
# unless different orders are passes to exec model's __init__
open_order:
  algoStrategy: Adaptive
  algoParams:
  - !!python/object/apply:ib_insync.TagValue
      - adaptivePriority
      - Normal
  tif: Day
  # outsideRth: True
    
close_order:
  tif: GTC
  # outsideRth: True
    
stop_order:
  outsideRth: True
  tif: GTC

tp_order:
  # don't use adaptive orders here as not compliant with OCA
  tif: GTC
  # outsideRth: True # seems never accepted
  
# all linked orders will use this oca_type (as per IB definition:  https://www.interactivebrokers.com/campus/ibkr-api-page/order-types/#one-cancels-all-orders)
oca_type: 2

# number of business days before last trading day that contract will be rolled
futures_roll_bdays: 3
# number of business days before roll day when new positions will use next contract
futures_roll_margin_bdays: 3
