source: contracts.csv
barSize: &barSize 30 secs
wts: &wts TRADES
max_lookback_days: null # optional run lookback cap; null loads all available data
clientId: 1 # keep distinct from live runtime clientId=0
supervisor: state # one of: state, onion
number_of_workers: 10
gap_fill_mode: off # off, heuristic, schedule, auto
useRTH: False
save_every_chunks: 10 # persist after this many downloaded chunks
restart_on_recovered_connection: False # restart immediately on IB 1102 "data maintained"
max_recoveries: 10 # max consecutive unexpected supervisor recoveries before stopping
pacer_no_restriction: False # toggle to quickly switch off client-side pacing
pacer_allowance_fraction: 1.0 # values above 1.0 deliberately exceed published IB limits
appTimeout: 600 # time of inactivity before we start probing for connection correctnesss

# ---- futures config ----
# contfuture, fullchain, current, exact, current_and_expired, current_and_contfuture
# current_and_expired is default; it will collect all available history
# that has not already been collected
futures_selector: "current_and_expired"
# TODO: needs to be tested
futures_fullchain_spec: full #  full, active, expired; which contracts should be included in futures fullchain; relevant only if futureshow==fullchain;
futures_current_index: 0 #  zero->current contfuture, positive index->future, negative->past; which contract is considered current; relevant only if futures_selector==current;
# ---- end futures config ----
logging_config: "dataloader_logging_config.yaml"
