startup:
  cold_start: false

connection: {}

logging: {}

controller:
  ignore_errors: [2107, 2108, 2109, 202, 321]
  future_roll_time: [14, 0]
  sync_frequency: 900
  execution_verification_delay: 15

state_machine: {}

storage:
  base_directory: ib_data
  mongodb:
    client:
      host: localhost
      port: 27017
    database: test_data
  block_library: null
  market_data_library: live_data
  dataframe_save_frequency: 900

blotter:
  enabled: true
  saver:
    type: csv
    options:
      folder: blotter
      name: blotter
      use_timestamp: false

orders:
  open:
    algoStrategy: Adaptive
    algoParams:
      - tag: adaptivePriority
        value: Normal
    tif: Day
  close:
    tif: GTC
  stop:
    outsideRth: true
    tif: GTC
  take_profit:
    tif: GTC
  oca_type: 2

timeout:
  seconds: 300

futures: {}
