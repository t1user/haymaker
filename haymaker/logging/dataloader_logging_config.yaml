version: 1
disable_existing_loggers: false


formatters:
  default:
    (): haymaker.logging.setup.UTCFormatter
    format:  "%(asctime)s | %(levelname)-8s | %(name)-23s | %(message)s | %(module)s %(funcName)s %(lineno)d"

handlers:
  ib_insync_null:
    class: logging.NullHandler

  console:
    class: haymaker.logging.handlers.TqdmLoggingHandler
    level: DEBUG
    formatter: default

  file:
    (): haymaker.logging.handlers.file_handler_setup
    level: DEBUG
    formatter: default
    delay: true
    filename: dataloaderLog
      
loggers:
  haymaker:
    level: DEBUG
    handlers: [console, file]
  ib_insync.wrapper:
    level: DEBUG
    handlers: [ib_insync_null]
    propagate: false
